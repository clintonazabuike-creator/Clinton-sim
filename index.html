<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile-World: God Sim</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; color: #00ff00; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #hud { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #333; pointer-events: none; }
        #controls { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #333; pointer-events: auto; }
        input { background: #111; border: 1px solid #00ff00; color: #00ff00; padding: 8px; width: 180px; }
        button { background: #00ff00; color: #000; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="hud" class="glitch">
        <div style="font-size: 1.2em; border-bottom: 1px solid #333; margin-bottom: 10px;">SMILE-WORLD v1.0</div>
        <div>BRIDGE_ID: <span id="my-id" style="color: #fff;">Initializing...</span></div>
        <div id="status" style="font-size: 0.8em; color: #888;">Scanning for peers...</div>
    </div>

    <div id="controls">
        <input type="text" id="target-id" placeholder="Paste Peer Bridge ID">
        <button id="connect-btn">OPEN WORMHOLE</button>
    </div>

    <canvas id="world"></canvas>

    <script type="module" src="simulation.js"></script>
</body>
</html>
