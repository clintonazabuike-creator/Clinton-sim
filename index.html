<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinton Sim :: God Mode</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        /* HUD & ID */
        #hud { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid #333; z-index: 10; }
        #my-id { color: #fff; background: #222; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #444; font-family: monospace; }
        #my-id:hover { background: #00ff00; color: #000; }

        /* Power Palette (The "Playable" Part) */
        #toolbar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; background: rgba(20,20,20,0.95); 
            padding: 10px; border: 2px solid #444; border-radius: 8px;
        }
        .tool { 
            width: 50px; height: 50px; border: 1px solid #555; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; background: #111; font-size: 20px; transition: 0.2s;
        }
        .tool:hover { border-color: #00ff00; background: #222; }
        .tool.active { border-color: #00ff00; background: #004400; box-shadow: 0 0 10px #00ff00; }

        /* Connection Box */
        #connect-box { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid #333; }
        input { background: #111; border: 1px solid #444; color: #00ff00; padding: 5px; width: 140px; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; margin-bottom: 5px;">CLINTON SIM v2.0</div>
        <div id="my-id">Initializing...</div>
    </div>

    <div id="connect-box">
        <input type="text" id="target-id" placeholder="Peer ID">
        <button id="connect-btn">CONNECT</button>
    </div>

    <div id="toolbar">
        <div class="tool active" data-power="spawn" title="Spawn Life">🧬</div>
        <div class="tool" data-power="bomb" title="Atomic Bomb">💥</div>
        <div class="tool" data-power="shield" title="Force Field">🛡️</div>
        <div class="tool" data-power="blackhole" title="Black Hole">🕳️</div>
    </div>
    <div id="bio-card" style="display: none; position: absolute; right: 0; top: 0; width: 300px; height: 100%; background: rgba(10,10,10,0.95); border-left: 2px solid #00ff00; color: #fff; padding: 20px; z-index: 100; overflow-y: auto;">
    <button onclick="document.getElementById('bio-card').style.display='none'" style="float: right; background: red; color: white; border: none; cursor: pointer;">X</button>
    
    <h2 id="bio-name" style="color: #00ff00; margin-bottom: 5px;">Citizen Name</h2>
    <div id="bio-role" style="font-size: 0.8em; color: #888; margin-bottom: 15px;">Role: Peasant</div>

    <hr border="0.5px solid #333">

    <div class="stat-group">
        <label>Health:</label> <input type="number" id="edit-health" style="width: 50px;">
        <label>Hunger:</label> <input type="number" id="edit-hunger" style="width: 50px;">
    </div>

    <div style="margin-top: 20px;">
        <p><strong>Lineage:</strong> <span id="bio-lineage">Unknown</span></p>
        <p><strong>Inventory:</strong></p>
        <ul id="bio-inventory" style="font-size: 0.9em;"></ul>
    </div>

    <div style="margin-top: 30px;">
        <button id="save-bio" style="width: 100%; background: #00ff00; color: #000; padding: 10px; font-weight: bold; cursor: pointer;">APPLY GOD CHANGES</button>
    </div>
    </div>
    

    <canvas id="world"></canvas>

    <script type="module">
        import { SmileBridge } from 'https://clintonazabuike-creator.github.io/Smile-bridge/smile-bridge.js';

        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let currentPower = 'spawn';
        const bridge = new SmileBridge('clinton-god-sim');
        
        // Setup ID Copying
        bridge.on('ready', (id) => {
            const el = document.getElementById('my-id');
            el.innerText = id;
            el.onclick = () => {
                navigator.clipboard.writeText(id);
                el.innerText = "COPIED!";
                setTimeout(() => el.innerText = id, 1000);
            };
        });

        class Unit {
            constructor(x, y, dna = null) {
                this.dna = dna || {
                    color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                    size: 5,
                    speed: Math.random() * 2 + 1
                };
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * this.dna.speed;
                this.vy = (Math.random() - 0.5) * this.dna.speed;
                this.dead = false;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    if (bridge.connections.size > 0) this.migrate();
                    else { this.vx *= -1; this.vy *= -1; }
                }
            }
            draw() {
                ctx.fillStyle = this.dna.color;
                ctx.fillRect(this.x, this.y, this.dna.size, this.dna.size);
            }
            migrate() {
                bridge.emit('MIGRATION', this.dna);
                this.dead = true;
            }
        }

        const world = {
            units: [],
            particles: [], // For explosions
            init() { this.loop(); },
            removeDead() { 
                this.units = this.units.filter(u => !u.dead); 
                this.particles = this.particles.filter(p => p.life > 0);
            },
            loop() {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                this.removeDead();
                this.units.forEach(u => { u.update(); u.draw(); });
                this.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.life--;
                    ctx.fillStyle = `rgba(255, ${p.life * 2}, 0, ${p.life / 50})`;
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                requestAnimationFrame(() => this.loop());
            }
        };

        // INTERACTION LOGIC
        canvas.addEventListener('mousedown', (e) => {
            const { clientX: x, clientY: y } = e;
            
            if (currentPower === 'spawn') {
                for(let i=0; i<5; i++) world.units.push(new Unit(x, y));
            } 
            else if (currentPower === 'bomb') {
                world.units.forEach(u => {
                    const dist = Math.hypot(u.x - x, u.y - y);
                    if (dist < 100) u.dead = true;
                });
                for(let i=0; i<50; i++) {
                    world.particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 50 });
                }
            }
            else if (currentPower === 'blackhole') {
                world.units.forEach(u => {
                    const angle = Math.atan2(y - u.y, x - u.x);
                    u.vx += Math.cos(angle) * 5;
                    u.vy += Math.sin(angle) * 5;
                });
            }
        });

        // Toolbar Logic
        document.querySelectorAll('.tool').forEach(t => {
            t.onclick = () => {
                document.querySelector('.tool.active').classList.remove('active');
                t.classList.add('active');
                currentPower = t.dataset.power;
            };
        });

        bridge.on('MIGRATION', (dna) => world.units.push(new Unit(canvas.width/2, canvas.height/2, dna)));
        document.getElementById('connect-btn').onclick = () => bridge.cross(document.getElementById('target-id').value);

        world.init();
    </script>
</body>
</html>
