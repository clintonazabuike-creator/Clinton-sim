<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="bio-card" class="hidden">
            <button onclick="document.getElementById('bio-card').classList.add('hidden')" 
                    style="float: right; background: none; border: none; color: #ff4444; cursor: pointer; font-size: 20px;">×</button>
            
            <h1 id="ent-name">Awaiting Selection...</h1>
            
            <div id="ent-traits" style="margin: 10px 0; min-height: 30px;"></div>
            
            <div class="divider"></div>

            <ul id="history-list">
                <li>Click a human or giant to inspect their soul.</li>
            </ul>

            <div class="divider"></div>
            
            <button class="god-btn">BESTOW SUPERNATURAL TRAIT</button>
        </div>
    </div>

    <script type="module" src="Main.js"></script>
</body>
</html>
